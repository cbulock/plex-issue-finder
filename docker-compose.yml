services:
  plex-issue-finder:
    build: .
    container_name: plex-issue-finder
    ports:
      - "3000:3000"
    volumes:
      - plex-issue-finder-data:/data
    environment:
      - NODE_ENV=production
      # Optional: seed credentials from host env (can also be set in the UI)
      # - PLEX_URL=${PLEX_URL}
      # - PLEX_TOKEN=${PLEX_TOKEN}
      # - RADARR_URL=${RADARR_URL}
      # - RADARR_API_KEY=${RADARR_API_KEY}
    restart: unless-stopped

volumes:
  plex-issue-finder-data:
